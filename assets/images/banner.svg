<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#60A5FA" stroke-width="0.5">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="1100" cy="60" r="120" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.08"/>
  <circle cx="1100" cy="60" r="80" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.1"/>
  <circle cx="1100" cy="60" r="40" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.15"/>
  <circle cx="180" cy="260" r="100" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.08"/>
  <!-- Left content -->
  <text x="64" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" fill="#FFFFFF">智趣宝盒</text>
  <text x="64" y="126" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#60A5FA" letter-spacing="1">Smart Learning Box</text>
  <rect x="64" y="150" width="80" height="4" rx="2" fill="url(#accent)"/>
  <text x="64" y="190" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#94A3B8">基于 ESP32-P4 的 AI 游戏化学习终端</text>
  <text x="64" y="214" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#64748B">AI Game-based Learning Terminal on ESP32-P4</text>
  <!-- Feature tags -->
  <g transform="translate(64, 240)">
    <rect rx="6" ry="6" width="60" height="26" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="30" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#60A5FA" text-anchor="middle">AI</text>
    <rect rx="6" ry="6" width="80" height="26" x="70" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="110" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#10B981" text-anchor="middle">OCR</text>
    <rect rx="6" ry="6" width="80" height="26" x="160" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="200" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#F59E0B" text-anchor="middle">NES</text>
    <rect rx="6" ry="6" width="70" height="26" x="250" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="285" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#A78BFA" text-anchor="middle">LVGL</text>
    <rect rx="6" ry="6" width="80" height="26" x="330" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="370" y="17" font-family="system-ui,sans-serif" font-size="12" fill="#F472B6" text-anchor="middle">RISC-V</text>
  </g>
  <!-- Right: Device mockup -->
  <g transform="translate(850, 60)">
    <rect x="0" y="0" width="360" height="240" rx="24" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <!-- Screen -->
    <rect x="12" y="12" width="336" height="216" rx="16" fill="#0F172A"/>
    <!-- Status bar -->
    <rect x="12" y="12" width="336" height="40" rx="16" fill="#1E293B"/>
    <text x="180" y="37" font-family="system-ui,sans-serif" font-size="14" fill="#60A5FA" text-anchor="middle" font-weight="bold">智趣宝盒</text>
    <text x="300" y="37" font-family="system-ui,sans-serif" font-size="11" fill="#10B981" text-anchor="end">● 在线</text>
    <text x="36" y="37" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">📶</text>
    <!-- Grid cards -->
    <g transform="translate(36, 68)">
      <rect width="144" height="72" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="72" y="30" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">🤖</text>
      <text x="72" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">AI老师</text>
    </g>
    <g transform="translate(192, 68)">
      <rect width="144" height="72" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="72" y="30" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">📷</text>
      <text x="72" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">拍照解题</text>
    </g>
    <g transform="translate(36, 152)">
      <rect width="144" height="72" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="72" y="30" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">🎮</text>
      <text x="72" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">趣味游戏</text>
    </g>
    <g transform="translate(192, 152)">
      <rect width="144" height="72" rx="12" fill="#1E293B" stroke="#334155" stroke-width="1"/>
      <text x="72" y="30" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">🏆</text>
      <text x="72" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">成长中心</text>
    </g>
  </g>
</svg>
