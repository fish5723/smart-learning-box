    <rect x="26" y="60" width="160" height="100" rx="8" fill="#334155"/>
    <text x="106" y="110" font-family="system-ui,sans-serif" font-size="20" text-anchor="middle">📷</text>
    <rect x="26" y="172" width="72" height="28" rx="8" fill="#2563EB"/><text x="62" y="191" font-family="system-ui,sans-serif" font-size="10" fill="#FFF" text-anchor="middle">拍照识别</text>
    <rect x="106" y="172" width="72" height="28" rx="8" fill="#334155"/><text x="142" y="191" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">导入图片</text>
