    <rect x="208" y="50" width="196" height="168" rx="12" fill="#0F172A"/>
    <text x="220" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#FFF">📝 识别结果</text>
    <text x="220" y="106" font-family="system-ui,sans-serif" font-size="12" fill="#E2E8F0">x² + 2x + 1 = 0</text>
    <text x="220" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">求 x 的值</text>
    <line x1="220" y1="134" x2="390" y2="134" stroke="#334155" stroke-width="0.5"/>
    <text x="220" y="152" font-family="system-ui,sans-serif" font-size="11" fill="#FFF">🤖 AI 解答</text>
    <text x="220" y="172" font-family="system-ui,sans-serif" font-size="11" fill="#10B981">(x+1)² = 0 → x = -1</text>
    <rect x="220" y="186" width="50" height="18" rx="6" fill="#10B981" opacity="0.2"/>
    <text x="245" y="199" font-family="system-ui,sans-serif" font-size="9" fill="#10B981" text-anchor="middle">完全平方</text>
  </g>

