    <rect x="82" y="48" width="60" height="24" rx="12" fill="#334155"/><text x="112" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">英语</text>
    <rect x="148" y="48" width="60" height="24" rx="12" fill="#334155"/><text x="178" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">语文</text>
