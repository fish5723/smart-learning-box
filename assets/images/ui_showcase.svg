    <text x="340" y="72" font-family="system-ui,sans-serif" font-size="11" fill="#F59E0B">Lv.3 680/1000</text>
    <rect x="290" y="82" width="100" height="6" rx="3" fill="#334155"/>
    <rect x="290" y="82" width="68" height="6" rx="3" fill="#F59E0B"/>
    <!-- 4 cards -->
