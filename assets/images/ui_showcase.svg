    <text x="360" y="24" font-family="system-ui,sans-serif" font-size="10" fill="#10B981">📶 · 🔋 92%</text>
    <rect x="16" y="50" width="388" height="52" rx="14" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
