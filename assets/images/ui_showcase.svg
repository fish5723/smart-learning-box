    <rect x="200" y="138" width="180" height="36" rx="14" fill="#2563EB"/><text x="222" y="154" font-family="system-ui,sans-serif" font-size="11" fill="#FFF">3 × 7 = 21 ✨</text>
    <rect x="28" y="182" width="200" height="24" rx="12" fill="#334155"/><text x="46" y="198" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">正在输入...</text>
