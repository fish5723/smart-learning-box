    <g transform="translate(114, 114)"><rect width="90" height="100" rx="12" fill="#0F172A" stroke="#334155" stroke-width="0.5"/><text x="45" y="40" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">📷</text><text x="45" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#CBD5E1" text-anchor="middle">拍照解题</text></g>
    <g transform="translate(212, 114)"><rect width="90" height="100" rx="12" fill="#0F172A" stroke="#334155" stroke-width="0.5"/><text x="45" y="40" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">🎮</text><text x="45" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#CBD5E1" text-anchor="middle">趣味游戏</text></g>
    <g transform="translate(310, 114)"><rect width="90" height="100" rx="12" fill="#0F172A" stroke="#334155" stroke-width="0.5"/><text x="45" y="40" font-family="system-ui,sans-serif" font-size="24" text-anchor="middle">🏆</text><text x="45" y="64" font-family="system-ui,sans-serif" font-size="11" fill="#CBD5E1" text-anchor="middle">成长中心</text></g>
