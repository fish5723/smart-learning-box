  <rect width="900" height="580" fill="url(#bg3)"/>
  <text x="450" y="44" font-family="system-ui,sans-serif" font-size="24" font-weight="bold" fill="#FFF" text-anchor="middle">🧭 界面预览 UI Showcase</text>
