    <rect x="224" y="88" width="36" height="36" rx="6" fill="#2563EB"/><text x="242" y="112" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">2</text>
    <rect x="264" y="88" width="36" height="36" rx="6" fill="#2563EB"/><text x="282" y="112" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">4</text>
    <rect x="304" y="88" width="36" height="36" rx="6" fill="#F59E0B"/><text x="322" y="112" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">8</text>
    <rect x="344" y="88" width="36" height="36" rx="6" fill="#F59E0B"/><text x="362" y="112" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">16</text>
    <rect x="224" y="128" width="36" height="36" rx="6" fill="#EF4444"/><text x="242" y="152" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">32</text>
    <rect x="264" y="128" width="36" height="36" rx="6" fill="#EF4444"/><text x="282" y="152" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">64</text>
    <rect x="304" y="128" width="36" height="36" rx="6" fill="#10B981"/><text x="322" y="152" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">128</text>
    <rect x="344" y="128" width="36" height="36" rx="6" fill="#10B981"/><text x="362" y="152" font-family="system-ui,sans-serif" font-size="14" fill="#FFF" text-anchor="middle">256</text>
