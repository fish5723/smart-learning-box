<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#0A0F1E"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="bspGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B4E"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A2A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" font-family="system-ui,sans-serif" font-size="18" fill="#60A5FA" text-anchor="middle" font-weight="bold">系统架构 / System Architecture</text>

  <!-- ============ LAYER 1: APP ============ -->
  <rect x="40" y="55" width="820" height="220" rx="16" fill="#0F172A" stroke="#1E3A5F" stroke-width="1.5" opacity="0.8" filter="url(#shadow)"/>
  <rect x="40" y="55" width="820" height="32" rx="16" fill="url(#appGrad)"/>
  <rect x="40" y="75" width="820" height="12" fill="url(#appGrad)"/>
  <text x="60" y="76" font-family="system-ui,sans-serif" font-size="13" fill="#60A5FA" font-weight="bold">应用层 APP</text>

  <!-- APP Modules -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
    <text x="55" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">🏠</text>
    <text x="55" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">HOME</text>
    <text x="55" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">首页·入口</text>

    <rect x="125" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
    <text x="180" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">🤖</text>
    <text x="180" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">AI</text>
    <text x="180" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">对话·答疑</text>

    <rect x="250" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="305" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">📷</text>
    <text x="305" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">OCR</text>
    <text x="305" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">拍照搜题</text>

    <rect x="375" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
    <text x="430" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">🎮</text>
    <text x="430" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">GAME</text>
    <text x="430" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">游戏中心</text>

    <rect x="500" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#A78BFA" stroke-width="1"/>
    <text x="555" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">🏆</text>
    <text x="555" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">ACHIEVEMENT</text>
    <text x="555" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">成就系统</text>

    <rect x="625" y="0" width="110" height="75" rx="10" fill="#1E293B" stroke="#F472B6" stroke-width="1"/>
    <text x="680" y="26" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle">📖</text>
    <text x="680" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">WRONG BOOK</text>
    <text x="680" y="65" font-family="system-ui,sans-serif" font-size="9" fill="#64748B" text-anchor="middle">错题本</text>
  </g>

  <!-- Manager layer inside APP -->
  <g transform="translate(60, 190)">
    <rect x="0" y="0" width="780" height="30" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="15" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Manager:</text>
    <text x="90" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">camera_manager</text>
    <text x="230" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">http_manager</text>
    <text x="360" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">ui_manager</text>
    <text x="470" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">answer_cache</text>
    <text x="580" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">font_loader</text>
    <text x="680" y="19" font-family="system-ui,sans-serif" font-size="11" fill="#60A5FA">icon_loader</text>
  </g>

  <!-- ============ LAYER 2: VISION ============ -->
  <rect x="40" y="285" width="820" height="110" rx="16" fill="#0F172A" stroke="#2D1B4E" stroke-width="1.5" opacity="0.8" filter="url(#shadow)"/>
  <rect x="40" y="285" width="820" height="32" rx="16" fill="url(#bspGrad)"/>
  <rect x="40" y="305" width="820" height="12" fill="url(#bspGrad)"/>
  <text x="60" y="306" font-family="system-ui,sans-serif" font-size="13" fill="#A78BFA" font-weight="bold">视觉层 VISION</text>

  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="240" height="50" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
    <text x="120" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle" font-weight="bold">Vision Core</text>
    <text x="120" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">状态机: IDLE→CAPTURE→UPLOAD→PROCESS→DISPLAY</text>

    <rect x="260" y="0" width="240" height="50" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
    <text x="380" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle" font-weight="bold">Vision OCR</text>
    <text x="380" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">OCR拍照搜题 + 相册导入解题</text>

    <rect x="520" y="0" width="260" height="50" rx="10" fill="#1E293B" stroke="#8B5CF6" stroke-width="1"/>
    <text x="650" y="20" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle" font-weight="bold">OCR Parser</text>
    <text x="650" y="38" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">JSON解析·知识点提取</text>
  </g>

  <!-- ============ LAYER 3: BSP ============ -->
  <rect x="40" y="405" width="820" height="140" rx="16" fill="#0F172A" stroke="#1A3A2A" stroke-width="1.5" opacity="0.8" filter="url(#shadow)"/>
  <rect x="40" y="405" width="820" height="32" rx="16" fill="url(#hwGrad)"/>
  <rect x="40" y="425" width="820" height="12" fill="url(#hwGrad)"/>
  <text x="60" y="426" font-family="system-ui,sans-serif" font-size="13" fill="#10B981" font-weight="bold">硬件抽象层 BSP</text>

  <g transform="translate(60, 450)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="55" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">LCD</text>

    <rect x="120" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="175" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">TOUCH</text>

    <rect x="240" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="295" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">CAMERA</text>

    <rect x="360" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="415" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">WIFI</text>

    <rect x="480" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="535" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">STORAGE</text>

    <rect x="600" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="655" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">BATTERY</text>

    <rect x="720" y="0" width="110" height="40" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <text x="775" y="24" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle">WEB_SERVER</text>
  </g>

  <!-- ============ LAYER 4: LVGL ============ -->
  <rect x="40" y="555" width="820" height="50" rx="16" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" filter="url(#shadow)"/>
  <g transform="translate(60, 568)">
    <rect x="0" y="0" width="780" height="28" rx="10" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
    <text x="390" y="19" font-family="system-ui,sans-serif" font-size="13" fill="#F59E0B" text-anchor="middle" font-weight="bold">LVGL 9.x — 图形用户界面框架 / GUI Framework</text>
  </g>

  <!-- ============ LAYER 5: RTOS/HW ============ -->
  <rect x="40" y="615" width="820" height="65" rx="16" fill="#0F172A" stroke="#F472B6" stroke-width="1.5" opacity="0.8" filter="url(#shadow)"/>
  <g transform="translate(60, 628)">
    <rect x="0" y="0" width="380" height="40" rx="10" fill="#1E293B" stroke="#F472B6" stroke-width="1"/>
    <text x="190" y="16" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle" font-weight="bold">FreeRTOS</text>
    <text x="190" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">双任务架构：UI Task + Business Task</text>

    <rect x="400" y="0" width="380" height="40" rx="10" fill="#1E293B" stroke="#F472B6" stroke-width="1"/>
    <text x="590" y="16" font-family="system-ui,sans-serif" font-size="12" fill="#CBD5E1" text-anchor="middle" font-weight="bold">ESP32-P4 (RISC-V 双核 400MHz)</text>
    <text x="590" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">32MB PSRAM · 16MB Flash · MIPI-DSI · MIPI-CSI</text>
  </g>

  <!-- Vertical connector lines -->
  <g stroke="#334155" stroke-width="1">
    <line x1="450" y1="275" x2="450" y2="285"/>
    <line x1="450" y1="395" x2="450" y2="405"/>
    <line x1="450" y1="545" x2="450" y2="555"/>
    <line x1="450" y1="605" x2="450" y2="615"/>
  </g>
</svg>
