<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Dialog_WifiPassword</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.mask{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.dialog{

width:560px;
background:#1E293B;
border-radius:20px;
padding:28px;
position:relative;
z-index:10;
box-shadow:0 12px 32px rgba(0,0,0,.45);

}

.title{

font-size:30px;
color:white;
margin-bottom:12px;

}

.ssid{

font-size:22px;
color:#60A5FA;
margin-bottom:28px;

}

.label{

font-size:18px;
color:#CBD5E1;
margin-bottom:10px;

}

.password{

height:54px;
background:#111827;
border-radius:12px;
padding:0 18px;
display:flex;
align-items:center;
font-size:22px;
color:white;
margin-bottom:18px;

}

.option{

display:flex;
align-items:center;
gap:10px;
color:#CBD5E1;
font-size:18px;
margin-bottom:28px;

}

.bottom{

display:flex;
justify-content:flex-end;
gap:18px;

}

.cancel{

width:120px;
height:48px;
background:#374151;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.ok{

width:140px;
height:48px;
background:#2563EB;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
}

.keyboard{

margin-top:30px;
height:210px;
background:#0F172A;
border-radius:18px;

display:flex;
justify-content:center;
align-items:center;

font-size:28px;
color:#64748B;

}
</style>

</head>

<body>

<div class="mask"></div>

<div class="dialog">

<div class="title">
连接 WiFi
</div>

<div class="ssid">
📶 TP-LINK_5G
</div>

<div class="label">
请输入密码
</div>

<div class="password">
**************
</div>

<div class="option">

☐ 显示密码

</div>

<div class="bottom">

<div class="cancel">
取消
</div>

<div class="ok">
连接
</div>

</div>

<div class="keyboard">

LVGL Keyboard

</div>

</div>

</body>

</html>
